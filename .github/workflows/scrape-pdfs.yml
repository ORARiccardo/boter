name: Scrape PDFs from URL list

# Triggers whenever urls.txt is edited (add a webpage URL, push, and this runs).
# Each line in urls.txt should be a webpage to scan for PDF links, not a direct
# PDF URL. Also runs manually via the Actions tab button.
on:
  push:
    paths:
      - 'urls.txt'
  workflow_dispatch:

permissions:
  contents: write   # needed so the workflow can commit results back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install PDF text extraction tool
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Scan pages and download any new PDFs
        run: python scrape_pdfs.py

      - name: Commit new PDFs and extracted text
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pdfs/ extracted/
          if ! git diff --cached --quiet; then
            git commit -m "Scrape new PDFs from urls.txt"
            git pull --rebase origin main
            git push
          else
            echo "No new PDFs to commit"
          fi
