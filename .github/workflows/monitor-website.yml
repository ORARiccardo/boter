name: Monitor Website Changes

# Runs on a schedule (edit the cron line for your preferred frequency),
# plus a manual button in the Actions tab for testing.
# Add or remove sites to watch by editing url_monitor.txt, one URL per line.
on:
  schedule:
    - cron: '0 12 * * 2,4'   # every hour, on the hour, UTC
  workflow_dispatch:

permissions:
  contents: write   # needed so the workflow can commit updated snapshots

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Check all monitored sites
        id: monitor
        run: python monitor_websites.py

      # Optional: notify Slack when any site changed.
      # Requires a repo secret named SLACK_WEBHOOK_URL. Delete this step if you don't want it.
      - name: Notify Slack on change
        if: steps.monitor.outputs.changed == 'true'
        run: |
          MESSAGE=$(echo "${{ steps.monitor.outputs.changed_urls }}" | sed 's/^/- /' | tr '\n' '\\n')
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Website change(s) detected:\\n${MESSAGE}\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Commit updated snapshots
        if: steps.monitor.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          git commit -m "Update website snapshots - change detected"
          git push
