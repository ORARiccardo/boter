name: Monitor Website Changes

# Runs on a schedule (edit the cron line for your preferred frequency),
# plus a manual button in the Actions tab for testing.
# Add or remove sites to watch by editing url_monitor.txt, one URL per line.
on:
  schedule:
    - cron: '0 6 * * 1,4'   # 6am UTC every Monday and Thursday
  workflow_dispatch:

permissions:
  contents: write   # needed so the workflow can commit updated snapshots

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install requests

      - name: Check all monitored sites
        id: monitor
        run: python monitor_websites.py

      - name: Commit snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots/
          if ! git diff --cached --quiet; then
            git commit -m "Update website snapshots"
            git push
          else
            echo "No snapshot changes to commit"
          fi
